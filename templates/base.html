<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>깃허브 알고리즘 스터디 도우미</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: #fffdf9;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-dark: #134e4a;
        --line: #d6d3d1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #fef3c7, transparent 28%),
          linear-gradient(180deg, #f4efe6 0%, #efe7db 100%);
        color: var(--text);
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px 60px;
      }

      .hero {
        padding: 28px;
        background: rgba(255, 253, 249, 0.9);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1;
      }

      .subtitle {
        margin: 16px 0 0;
        max-width: 620px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 20px;
        margin-top: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
      }

      label {
        display: block;
        margin-bottom: 10px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        font-size: 1rem;
      }

      button {
        margin-top: 14px;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: white;
        font-size: 0.98rem;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .tips {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.8;
      }

      .card-list {
        display: grid;
        gap: 14px;
        margin-top: 20px;
      }

      .stack {
        display: grid;
        gap: 20px;
        margin-top: 20px;
      }

      .problem-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        background: #fff;
      }

      .problem-card h3 {
        margin: 0 0 10px;
      }

      .badge {
        display: inline-block;
        margin-bottom: 10px;
        padding: 4px 10px;
        border-radius: 999px;
        background: #ccfbf1;
        color: #115e59;
        font-size: 0.85rem;
      }

      .empty {
        margin-top: 20px;
        padding: 20px;
        border: 1px dashed var(--line);
        border-radius: 16px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.65);
      }

      .plain-list {
        margin: 12px 0 0;
        padding-left: 18px;
      }

      .plain-list li {
        margin-bottom: 8px;
      }

      .section-title {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
